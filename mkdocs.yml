# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Kogot documentation
site_description: "Documentation of Kogot Kotlin Binding to Godot GDE"
site_author: "Kingg22 <https://github.com/kingg22>"
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
# TODO add language selection support
#extra:
#  alternate:
#    - name: English
#      link: /en/
#      lang: en
extra_css:
  - styles/colors.css
nav:
  - Home: index.md
  - API Reference: api/index.html
repo_name: kogot
repo_url: "https://github.com/kingg22/kogot"
site_dir: build/mkdocs
strict: true
site_url: "https://kingg22.github.io/kogot/"
use_directory_urls: false
markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
plugins:
  - search
  - offline
