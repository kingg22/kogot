# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
# https://mvnrepository.com/artifact/androidx.room/room-compiler-processing-testing
androidx-room-compiler = "2.8.4"

# https://github.com/apache/commons-compress/tags
apache-commons-compress = "1.28.0"

# https://github.com/google/error-prone/releases
errorprone-core = "2.49.0"

# https://github.com/tbroyer/gradle-errorprone-plugin/releases
errorprone-gradle = "5.1.0"

# https://github.com/JetBrains/java-annotations/releases
jetbrains-jvm-annotations = "26.1.0"

# https://github.com/jspecify/jspecify/releases
jspecify = "1.0.0"

# https://github.com/google/truth/releases
google-truth = "1.4.5"

# https://github.com/kotest/kotest/releases
kotest = "6.1.11"

# https://github.com/JetBrains/kotlin/releases
kotlin = "2.3.21"

# https://github.com/Kotlin/kotlinx.serialization/releases
kotlinx-serialization = "1.11.0"

# https://github.com/square/kotlinpoet/releases
kotlinpoet = "2.3.0"

# https://github.com/google/ksp/releases
ksp-api = "2.3.2"
ksp-plugin = "2.3.7"

# https://github.com/uber/NullAway/releases
nullaway = "0.13.4"

# https://github.com/tbroyer/gradle-nullaway-plugin/releases
nullaway-gradle = "3.0.0"

slf4j = "2.0.17"

# https://github.com/diffplug/spotless/blob/main/plugin-gradle/CHANGES.md
# https://github.com/diffplug/spotless/releases
spotless = "8.4.0"

# https://github.com/michel-kraemer/gradle-download-task/releases
undercouch-download = "5.7.0"

[libraries]
# Kotlin
kotlin-reflect = { group = "org.jetbrains.kotlin", name = "kotlin-reflect", version.ref = "kotlin" }
kotlin-test = { group = "org.jetbrains.kotlin", name = "kotlin-test", version.ref = "kotlin" }

# KotlinX
kotlinx-serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinx-serialization" }

# Kotest test DSL
kotest-assertions-core = { group = "io.kotest", name = "kotest-assertions-core", version.ref = "kotest" }

jetbrains-annotations = { group = "org.jetbrains", name = "annotations", version.ref = "jetbrains-jvm-annotations" }

# kotlinpoet
kotlinpoet = { group = "com.squareup", name = "kotlinpoet", version.ref = "kotlinpoet" }
kotlinpoet-ksp = { group = "com.squareup", name = "kotlinpoet-ksp", version.ref = "kotlinpoet" }

# logger
slf4j-api = { group = "org.slf4j", name = "slf4j-api", version.ref = "slf4j" }

# Processor
ksp-api = { group = "com.google.devtools.ksp", name = "symbol-processing-api", version.ref = "ksp-api" }
androidx-room-compiler = { group = "androidx.room", name = "room-compiler-processing", version.ref = "androidx-room-compiler" }
# Processor test
androidx-room-compiler-testing = { group = "androidx.room", name = "room-compiler-processing-testing", version.ref = "androidx-room-compiler" }
google-truth = { group = "com.google.truth", name = "truth", version.ref = "google-truth" }

# build-logic
apache-commons-compress = { group = "org.apache.commons", name = "commons-compress", version.ref = "apache-commons-compress" }
errorprone-core = { group = "com.google.errorprone", name = "error_prone_core", version.ref = "errorprone-core" }
jspecify = { group = "org.jspecify", name = "jspecify", version.ref = "jspecify" }
nullaway = { group = "com.uber.nullaway", name = "nullaway", version.ref = "nullaway" }

# gradle plugins
erroprone-gradle = { group = "net.ltgt.errorprone", name = "net.ltgt.errorprone.gradle.plugin", version.ref = "errorprone-gradle" }
kotlin-gradle-plugin = { group = "org.jetbrains.kotlin", name = "kotlin-gradle-plugin", version.ref = "kotlin" }
nullaway-gradle = { group = "net.ltgt.nullaway", name = "net.ltgt.nullaway.gradle.plugin", version.ref = "nullaway-gradle" }
spotless-gradle = { group = "com.diffplug.spotless", name = "spotless-plugin-gradle", version.ref = "spotless" }
download-gradle = { group = "de.undercouch.download", name = "de.undercouch.download.gradle.plugin", version.ref = "undercouch-download" }

# Libraries can be bundled together for easier import
[bundles]
gradle-plugins = [
    "erroprone-gradle",
    "kotlin-gradle-plugin",
    "nullaway-gradle",
    "spotless-gradle",
    "download-gradle",
]

[plugins]
download = { id = "de.undercouch.download", version.ref = "undercouch-download" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp-plugin" }
error-prone = { id = "net.ltgt.errorprone", version.ref = "errorprone-gradle" }
nullaway = { id = "net.ltgt.nullaway", version.ref = "nullaway-gradle" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }

# buildlogic convention plugins
kotlin-jvm-common-conventions = { id = "buildlogic.kotlin-jvm-common-conventions" }
kotlin-library-conventions = { id = "buildlogic.kotlin-library-conventions" }
kotlin-application-conventions = { id = "buildlogic.kotlin-application-conventions" }
kotlin-multiplatform-conventions = { id = "buildlogic.kotlin-multiplatform-conventions" }
kotlin-styles-conventions = { id = "buildlogic.kotlin-styles-conventions" }
java-library-conventions = { id = "buildlogic.java-library-conventions" }
java-nullsafety = { id = "buildlogic.java-null-check" }
java-styles-conventions = { id = "buildlogic.java-styles-conventions" }
jvm-toolchain-conventions = { id = "buildlogic.jvm-toolchain-conventions" }
testing-jvm-conventions = { id = "buildlogic.testing-jvm-conventions" }
common-styles-conventions = { id = "buildlogic.common-styles-conventions" }
godot-export-conventions = { id = "buildlogic.godot-export-conventions" }
godot-codegen-simple = { id = "buildlogic.godot-codegen" }
godot-codegen-chore = { id = "buildlogic.godot-codegen-chore" }
jextract = { id = "buildlogic.jextract" }
